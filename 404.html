<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BiLova - Redirect</title>
    <script>
      // GitHub Pages SPA routing fix
      // Stores path in sessionStorage and redirects to index
      var segmentCount = 1; // matches the number of segments in the repo basename (/Bilova-web)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?path=' +
        encodeURIComponent(l.pathname.slice(1) + (l.search ? l.search : '') + l.hash)
      );
    </script>
  </head>
  <body>Mengalihkan...</body>
</html>
